name: Auto Update Hugo and Theme

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write

concurrency:
  group: "auto-update"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  auto-update:
    runs-on: ubuntu-latest
    env:
      CF_PAGES_PROJECT_NAME: hey-run
    steps:
      - name: Check for running workflows
        id: check-running
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'in_progress',
              per_page: 100
            });
            const other = runs.workflow_runs.filter(r => r.id !== context.runId);
            if (other.length > 0) {
              const names = other.map(r => `${r.name} (#${r.run_number})`).join(', ');
              core.notice(`Skipping: ${other.length} workflow(s) in progress: ${names}`);
              return 'skip';
            }
            return 'run';

      - name: Checkout
        if: steps.check-running.outputs.result == 'run'
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current theme version
        if: steps.check-running.outputs.result == 'run'
        id: current
        run: |
          CURRENT_THEME=$(cd themes/blowfish && git rev-parse HEAD)
          echo "theme=${CURRENT_THEME}" >> "$GITHUB_OUTPUT"

      - name: Get latest Hugo version
        if: steps.check-running.outputs.result == 'run'
        id: latest-hugo
        run: |
          LATEST_HUGO=$(curl -sL https://api.github.com/repos/gohugoio/hugo/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          if [[ -z "$LATEST_HUGO" ]]; then
            echo "::error::Failed to get latest Hugo version from GitHub API"
            exit 1
          fi
          echo "version=${LATEST_HUGO}" >> "$GITHUB_OUTPUT"

      - name: Get Cloudflare Pages build command
        if: steps.check-running.outputs.result == 'run'
        id: cf-hugo
        uses: actions/github-script@v7
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          LATEST_HUGO: ${{ steps.latest-hugo.outputs.version }}
        with:
          script: |
            const accountId = process.env.CF_ACCOUNT_ID;
            const token = process.env.CF_API_TOKEN;
            const projectName = process.env.CF_PAGES_PROJECT_NAME;
            const latest = process.env.LATEST_HUGO;

            if (!accountId || !token) {
              core.setFailed('Missing CF_ACCOUNT_ID or CF_API_TOKEN repository secret.');
              return;
            }

            async function cf(path, options = {}) {
              const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
                ...options,
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json',
                  ...(options.headers || {})
                }
              });
              const body = await response.json();
              if (!response.ok || !body.success) {
                throw new Error(`${response.status} ${response.statusText}: ${JSON.stringify(body.errors || body)}`);
              }
              return body.result;
            }

            const project = await cf(`/accounts/${accountId}/pages/projects/${projectName}`);
            const buildCommand = project.build_config?.build_command || '';
            const match = buildCommand.match(/\bHUGO_VERSION=([0-9]+\.[0-9]+\.[0-9]+)\b/);
            if (!match) {
              throw new Error(`Could not find HUGO_VERSION=x.y.z in Cloudflare Pages build command: ${buildCommand}`);
            }
            const current = match[1];
            const nextCommand = buildCommand.replace(/\bHUGO_VERSION=[0-9]+\.[0-9]+\.[0-9]+\b/, `HUGO_VERSION=${latest}`);

            core.setOutput('current', current);
            core.setOutput('build_command', buildCommand);
            core.setOutput('next_build_command', nextCommand);
            core.setOutput('needs_update', current !== latest ? 'true' : 'false');
            core.notice(`Cloudflare Pages build command HUGO_VERSION: current=${current}, latest=${latest}`);

      - name: Update theme submodule
        if: steps.check-running.outputs.result == 'run'
        run: |
          git submodule update --remote themes/blowfish

      - name: Build with latest Hugo
        if: steps.check-running.outputs.result == 'run'
        id: build
        continue-on-error: true
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Shanghai
        run: |
          HUGO_VERSION=${{ steps.latest-hugo.outputs.version }}
          mkdir -p "${{ runner.temp }}/hugo"
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -o "${{ runner.temp }}/hugo.tar.gz"
          tar -xzf "${{ runner.temp }}/hugo.tar.gz" -C "${{ runner.temp }}/hugo"
          "${{ runner.temp }}/hugo/hugo" --minify

      - name: Check for changes
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'success'
        id: changes
        run: |
          NEW_THEME=$(cd themes/blowfish && git rev-parse HEAD)
          THEME_CHANGED="false"

          if [[ "${{ steps.current.outputs.theme }}" != "${NEW_THEME}" ]]; then
            THEME_CHANGED="true"
          fi

          echo "theme_changed=${THEME_CHANGED}" >> "$GITHUB_OUTPUT"

          if [[ "$THEME_CHANGED" == "false" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "message=" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            MSG="chore: auto update theme blowfish to ${NEW_THEME:0:7}"
            echo "message=${MSG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check override drift
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'success' && steps.changes.outputs.theme_changed == 'true'
        id: drift
        run: |
          OVERRIDE_FILES=(
            "layouts/partials/article-link/card-related.html"
            "layouts/partials/article-link/card.html"
            "layouts/partials/article-link/simple.html"
            "layouts/partials/article-link/_shortcode.html"
            "layouts/_default/_markup/render-image.html"
          )
          DRIFT_FILES=""
          for f in "${OVERRIDE_FILES[@]}"; do
            THEME_FILE="themes/blowfish/$f"
            if [[ -f "$THEME_FILE" ]] && ! diff -q "$f" "$THEME_FILE" > /dev/null 2>&1; then
              DRIFT_FILES="$DRIFT_FILES"$'\n- `'"$f"'`'
            fi
          done
          if [[ -n "$DRIFT_FILES" ]]; then
            echo "drift_found=true" >> "$GITHUB_OUTPUT"
            {
              echo "DRIFT_FILES<<EOF"
              echo "$DRIFT_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            NEW_THEME=$(cd themes/blowfish && git rev-parse HEAD)
            echo "new_theme=${NEW_THEME}" >> "$GITHUB_OUTPUT"
            echo "::warning::Override files have drifted from theme originals. Check workflow log for details."
          else
            echo "drift_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on override drift
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'success' && steps.drift.outputs.drift_found == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DRIFT_FILES: ${{ steps.drift.outputs.DRIFT_FILES }}
          OLD_THEME: ${{ steps.current.outputs.theme }}
          NEW_THEME: ${{ steps.drift.outputs.new_theme }}
        with:
          script: |
            const title = 'Override files have drifted from theme originals';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => issue.title === title);
            const driftFiles = process.env.DRIFT_FILES;
            const oldTheme = process.env.OLD_THEME;
            const newTheme = process.env.NEW_THEME;
            const body = [
              'The Blowfish theme was updated and the following override files have diverged from the theme originals:',
              '',
              driftFiles,
              '',
              'This means the theme has changes in these files that your overrides are not receiving. Review the diff and merge any important changes (bug fixes, security patches, new features) into your override files.',
              '',
              '```bash',
              '# Example: review diff for a specific file',
              'diff layouts/partials/article-link/card.html themes/blowfish/layouts/partials/article-link/card.html',
              '```',
              '',
              `- **Theme version**: \`${oldTheme.slice(0, 7)}\` → \`${newTheme.slice(0, 7)}\``,
              `- **Workflow run**: [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            ].join('\n');
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
              core.notice(`Updated existing issue: ${existing.html_url}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.notice(`Created issue: ${issue.html_url}`);
            }

      - name: Update Cloudflare Pages build command
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'success' && steps.cf-hugo.outputs.needs_update == 'true'
        uses: actions/github-script@v7
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          NEXT_BUILD_COMMAND: ${{ steps.cf-hugo.outputs.next_build_command }}
        with:
          script: |
            const accountId = process.env.CF_ACCOUNT_ID;
            const token = process.env.CF_API_TOKEN;
            const projectName = process.env.CF_PAGES_PROJECT_NAME;
            const buildCommand = process.env.NEXT_BUILD_COMMAND;

            async function cf(path, options = {}) {
              const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
                ...options,
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json',
                  ...(options.headers || {})
                }
              });
              const body = await response.json();
              if (!response.ok || !body.success) {
                throw new Error(`${response.status} ${response.statusText}: ${JSON.stringify(body.errors || body)}`);
              }
              return body.result;
            }

            await cf(`/accounts/${accountId}/pages/projects/${projectName}`, {
              method: 'PATCH',
              body: JSON.stringify({
                build_config: {
                  build_command: buildCommand
                }
              })
            });
            core.notice(`Updated Cloudflare Pages build command to: ${buildCommand}`);

      - name: Commit and push
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'success' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add themes/blowfish
          git commit -m "${{ steps.changes.outputs.message }}"
          git push

      - name: Trigger Cloudflare Pages rebuild
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'success' && steps.cf-hugo.outputs.needs_update == 'true' && steps.changes.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        with:
          script: |
            const accountId = process.env.CF_ACCOUNT_ID;
            const token = process.env.CF_API_TOKEN;
            const projectName = process.env.CF_PAGES_PROJECT_NAME;

            async function cf(path, options = {}) {
              const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
                ...options,
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json',
                  ...(options.headers || {})
                }
              });
              const body = await response.json();
              if (!response.ok || !body.success) {
                throw new Error(`${response.status} ${response.statusText}: ${JSON.stringify(body.errors || body)}`);
              }
              return body.result;
            }

            const deployments = await cf(`/accounts/${accountId}/pages/projects/${projectName}/deployments?env=production&per_page=1`);
            if (!deployments.length) {
              throw new Error('No production deployment found to retry.');
            }

            const deployment = await cf(`/accounts/${accountId}/pages/projects/${projectName}/deployments/${deployments[0].id}/retry`, {
              method: 'POST'
            });
            core.notice(`Retried Cloudflare Pages production deployment ${deployment.id || deployment.short_id || deployments[0].id}.`);

      - name: Create issue on build failure
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Auto-update build failed after theme update';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              core.notice(`Issue already exists: ${existing.html_url}`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The daily auto-update workflow failed after updating the Blowfish theme submodule and/or testing Hugo v${{ steps.latest-hugo.outputs.version }}.\n\n- **Hugo version used for validation**: v${{ steps.latest-hugo.outputs.version }}\n- **Build error**: Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nNo changes were pushed and the Cloudflare Pages build command was not updated.`
            })

      - name: Fail workflow on build error
        if: steps.check-running.outputs.result == 'run' && steps.build.outcome == 'failure'
        run: |
          echo "::error::Build failed after updating the Blowfish theme and/or testing latest Hugo. Changes were not pushed and the Cloudflare Pages build command was not updated."
          exit 1
